<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duncan McArthur Hall Map</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .map-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .map-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="map-wrap">
   <iframe
  src="https://duncanmcarthurhall.expofp.com/?kiosk=1&allowConsent=false"
  allow="clipboard-read; clipboard-write">
</iframe>
  </div>
</body>
</html>
