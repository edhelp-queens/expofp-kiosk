<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duncan McArthur Hall Map</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .hero {
      height: 180px; /* 👈 fixed height works better than vh on phones */
      background-image: url("DunMac.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    .map-wrap {
      flex: 1;
      position: relative;
    }

    .map-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Optional: slightly smaller header on very small screens */
    @media (max-width: 600px) {
      .hero {
        height: 120px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    
    <!-- Top image -->
    <div class="hero"></div>

    <!-- Map -->
    <div class="map-wrap">
      <iframe
        src="https://duncanmcarthurhall.expofp.com/?allowConsent=false"
        allow="clipboard-read; clipboard-write">
      </iframe>
    </div>

  </div>
</body>
</html>
