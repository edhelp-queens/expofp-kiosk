<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }

    iframe {
      position: absolute;
      top: 14%;
      left: 50%;
      width: 100vw;
      height: 112vh;
      border: 0;
      transform: translateX(-50%) scale(1.12);
      transform-origin: top center;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe
      src="https://duncanmcarthurhall.expofp.com/"
      title="Duncan McArthur Hall ExpoFP Map"
      allow="fullscreen"
      loading="eager">
    </iframe>
  </div>
</body>
</html>
