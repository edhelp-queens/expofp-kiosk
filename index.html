<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .debug {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      overflow: hidden;
      background: #ffffff;
    }

    .map-shell {
      position: relative;
      width: 390px;
      max-width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }

    #floorplan-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="debug">SCRIPT TEST 3</div>

  <div class="page">
    <div class="map-shell">
      <div id="floorplan-wrap">
        <div
          id="floorplan"
          class="expofp-floorplan"
          data-data-url="https://duncanmcarthurhall.expofp.com/data/"
          data-event="duncanmcarthurhall">
        </div>
      </div>
    </div>
  </div>

  <script src="https://efp-data.s3.amazonaws.com/packages/main/expofp.js" crossorigin="anonymous"></script>
  <script>
    window.addEventListener("load", function () {
      new ExpoFP.FloorPlan({
        element: document.getElementById("floorplan"),
        eventId: "duncanmcarthurhall",
        allowConsent: false
      });
    });
  </script>
</body>
</html>
