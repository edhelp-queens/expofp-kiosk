<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width"
  />
  <title>Duncan McArthur Hall Map</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #floorplan-wrap {
      position: relative;
      height: 100%;
      width: 100%;
    }

    #floorplan {
      height: 100%;
      width: 100%;
    }

    .search-shell {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      padding: 14px 16px;
      border: 1px solid #cfcfcf;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.20);
      font-size: 16px;
    }

    .search-btn,
    .clear-btn {
      padding: 14px 16px;
      border: 1px solid #cfcfcf;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.20);
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }

    .status {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 74px;
      z-index: 9999;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
      font-size: 14px;
      display: none;
    }

    @media (min-width: 769px) {
      .search-shell {
        top: 16px;
        right: 16px;
        left: auto;
        bottom: auto;
        width: 420px;
      }

      .status {
        top: 74px;
        right: 16px;
        left: auto;
        bottom: auto;
        width: 420px;
      }
    }
  </style>

  <script src="https://efp-data.s3.amazonaws.com/packages/main/expofp.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="floorplan-wrap">
    <div
      id="floorplan"
      class="expofp-floorplan"
      data-data-url="https://duncanmcarthurhall.expofp.com/data/"
      data-event="duncanmcarthurhall"
    ></div>

    <div id="status" class="status"></div>

    <div class="search-shell">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search rooms, offices, locations..."
        autocomplete="off"
      />
      <button id="searchBtn" class="search-btn" type="button">Search</button>
      <button id="clearBtn" class="clear-btn" type="button">Clear</button>
    </div>
  </div>

  <script>
    let fp;
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");

    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.style.display = message ? "block" : "none";
    }

    function hideStatus() {
      statusEl.textContent = "";
      statusEl.style.display = "none";
    }

    function selectorFromResultItem(item) {
      if (!item) return null;

      if (item.entity && item.entity.type === "booth") {
        if (item.externalId) return { booths: [{ externalId: item.externalId }] };
        if (item.name) return { booths: [{ name: item.name }] };
      }

      if (item.entity && item.entity.type === "exhibitor") {
        if (item.externalId) return { exhibitors: [{ externalId: item.externalId }] };
        if (item.name) return { exhibitors: [{ name: item.name }] };
      }

      if (item.name) {
        return { booths: [{ name: item.name }] };
      }

      return null;
    }

    async function runSearch() {
      const term = inputEl.value.trim();
      if (!term || !fp) {
        hideStatus();
        return;
      }

      try {
        const results = await fp.search(term);

        if (!results || !results.length) {
          showStatus(`No matches found for "${term}".`);
          return;
        }

        const best = results[0];
        const item = best.item || best;
        const selector = selectorFromResultItem(item);

        if (selector) {
          fp.zoomTo(selector, { padding: 40 });
        }

        const label = item.name || term;
        const type = item.entity && item.entity.type ? ` (${item.entity.type})` : "";
        showStatus(`Showing best match: ${label}${type}`);
      } catch (err) {
        console.error(err);
        showStatus("Search failed.");
      }
    }

    function clearSearch() {
      inputEl.value = "";
      hideStatus();
      location.reload();
    }

    searchBtn.addEventListener("click", runSearch);
    clearBtn.addEventListener("click", clearSearch);
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        runSearch();
      }
    });

    fp = new ExpoFP.FloorPlan({
      element: document.querySelector("#floorplan"),
      eventId: "duncanmcarthurhall",
      allowConsent: false,
      onInit: function(instance) {
        fp = instance;

        if (fp.setVisibility) {
          fp.setVisibility({
            controls: false,
            levels: true,
            header: false,
            overlay: false
          });
        }
      }
    });
  </script>
</body>
</html>
