<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="width=390, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .debug {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: #ffffff;
    }

    .phone-shell {
      width: 390px;
      max-width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      background: #ffffff;
    }

    #floorplan {
      width: 100%;
      height: 100%;
    }

    /* Try to nudge top UI a bit lower if ExpoFP uses top-positioned controls */
    #floorplan *[style*="top: 0"],
    #floorplan *[style*="top:0"] {
      top: 60px !important;
    }
  </style>
</head>
<body>
  <div class="debug">SCRIPT TEST 1</div>

  <div class="viewport">
    <div class="phone-shell">
      <div
        id="floorplan"
        class="expofp-floorplan"
        data-data-url="https://duncanmcarthurhall.expofp.com/data/"
        data-event="duncanmcarthurhall">
      </div>
    </div>
  </div>

  <script src="https://efp-data.s3.amazonaws.com/packages/main/expofp.js" crossorigin="anonymous"></script>
  <script>
    new ExpoFP.FloorPlan({
      element: document.querySelector("#floorplan"),
      eventId: "duncanmcarthurhall",
      allowConsent: false
    });
  </script>
</body>
</html>
