<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duncan McArthur Hall Map</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    .hero {
      flex: 0 0 180px;
      background-image: url("DunMac.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .map-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    .map-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero"></div>

    <div class="map-wrap">
      <iframe
        src="https://duncanmcarthurhall.expofp.com/?kiosk=1&allowConsent=false"
  allow="clipboard-read; clipboard-write">
      </iframe>
    </div>
  </div>
</body>
</html>
