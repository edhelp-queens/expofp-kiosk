<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .debug {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="debug">MOBILE TEST B</div>
  <div class="wrap">
    <iframe
      src="https://duncanmcarthurhall.expofp.com/"
      title="Duncan McArthur Hall ExpoFP Map"
      loading="eager"
      allow="fullscreen">
    </iframe>
  </div>
</body>
</html>
