<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 10%;   /* 👈 pushes content DOWN */
      left: 50%;
      transform: translateX(-50%) scale(1.1); /* slight zoom */
      transform-origin: top center;
      width: 100vw;
      height: 110vh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe src="https://duncanmcarthurhall.expofp.com/"></iframe>
  </div>
</body>
