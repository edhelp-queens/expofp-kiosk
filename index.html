<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Duncan McArthur Hall Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    body {
      position: relative;
    }

    .debug {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font: 18px Arial, sans-serif;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }

    #floorplan {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-width: 100vw;
      min-height: 100vh;
    }

    #floorplan > * {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="debug">SCRIPT TEST 2</div>

  <div class="viewport">
    <div
      id="floorplan"
      class="expofp-floorplan"
      data-data-url="https://duncanmcarthurhall.expofp.com/data/"
      data-event="duncanmcarthurhall">
    </div>
  </div>

  <script src="https://efp-data.s3.amazonaws.com/packages/main/expofp.js" crossorigin="anonymous"></script>
  <script>
    window.addEventListener("load", function () {
      new ExpoFP.FloorPlan({
        element: document.querySelector("#floorplan"),
        eventId: "duncanmcarthurhall",
        allowConsent: false
      });
    });
  </script>
</body>
</html>
