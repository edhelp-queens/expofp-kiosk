<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duncan McArthur Hall Map</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    .hero {
      flex: 0 0 30vh; /* 👈 adjust this to move map up/down */
      background-image: url("DunMac.png");
      background-size: contain;           /* 👈 shows full image */
      background-position: center bottom; /* 👈 anchors image nicely */
      background-repeat: no-repeat;
      background-color: #000;             /* fills empty space */
    }

    .map-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    .map-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="page">
    
    <!-- Top image -->
    <div class="hero"></div>

    <!-- Map -->
    <div class="map-wrap">
      <iframe
        src="https://duncanmcarthurhall.expofp.com/?kiosk=1&allowConsent=false"
        allow="clipboard-read; clipboard-write">
      </iframe>
    </div>

  </div>
</body>
</html>
