<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duncan McArthur Hall Map - 3rd Floor</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    .hero {
      flex: 0 0 30vh;
      background-image: url("DunMac.png");
      background-size: contain;
      background-position: center bottom;
      background-repeat: no-repeat;
      background-color: #000;
    }

    .map-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    .map-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="hero"></div>

    <div class="map-wrap">
     <iframe
  src="https://duncanmcarthurhall.expofp.com/?k=4&centerxy=2750.380859375%2C1930.9798583984375&z=Level3&bearing=270&zoom=0.85"
  allow="clipboard-read; clipboard-write">
</iframe>
    </div>
  </div>
</body>
</html>
